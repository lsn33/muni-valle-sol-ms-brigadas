apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-brigadas
  namespace: muni-valle-sol
  labels:
    app: ms-brigadas
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-brigadas
  template:
    metadata:
      labels:
        app: ms-brigadas
    spec:
      containers:
        - name: ms-brigadas
          image: JOAKOO123/muni-valle-sol-ms-brigadas:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8084
              protocol: TCP
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: ms-brigadas-secret
                  key: DB_URL
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ms-brigadas-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ms-brigadas-secret
                  key: DB_PASSWORD
            - name: SERVER_PORT
              value: "8084"
          resources:
            requests:
              memory: "256Mi"
              cpu: "150m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 2
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 30